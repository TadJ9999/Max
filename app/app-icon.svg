<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Source for `tauri icon` — the Max AI mascot orb (matches public/orb-icon.svg
       and the in-app Mascot/FAB). Cleaned for rasterizers: stroke-opacity instead
       of rgba(), no CSS box-shadow. Transparent background for rounded app icons. -->
  <defs>
    <radialGradient id="base" cx="50%" cy="30%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#8db8ff"/>
      <stop offset="100%" stop-color="#2e7fff"/>
    </radialGradient>
    <radialGradient id="fluid-a" cx="36%" cy="38%" r="52%">
      <stop offset="0%" stop-color="#ff50b8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff50b8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fluid-b" cx="64%" cy="60%" r="54%">
      <stop offset="0%" stop-color="#2e7fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2e7fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fluid-c" cx="50%" cy="66%" r="56%">
      <stop offset="0%" stop-color="#9b5cff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#9b5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gloss" cx="33%" cy="24%" r="22%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gloss2" cx="68%" cy="80%" r="22%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="depth" cx="50%" cy="86%" r="46%">
      <stop offset="0%" stop-color="#281250" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#281250" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-fluid" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <clipPath id="orb-clip">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
  </defs>

  <!-- outer glow ring -->
  <circle cx="32" cy="32" r="31" fill="none" stroke="#6ea0ff" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- base sphere -->
  <circle cx="32" cy="32" r="30" fill="url(#base)"/>

  <!-- fluid lobes (clipped to sphere) -->
  <g clip-path="url(#orb-clip)">
    <ellipse cx="32" cy="32" rx="48" ry="48" fill="url(#fluid-a)" filter="url(#blur-fluid)" opacity="0.9"/>
    <ellipse cx="32" cy="32" rx="48" ry="48" fill="url(#fluid-b)" filter="url(#blur-fluid)" opacity="0.85"/>
    <ellipse cx="32" cy="32" rx="48" ry="48" fill="url(#fluid-c)" filter="url(#blur-fluid)" opacity="0.9"/>
    <!-- inner depth shading toward the bottom -->
    <circle cx="32" cy="32" r="30" fill="url(#depth)"/>
  </g>

  <!-- specular gloss + bottom rim glow -->
  <circle cx="32" cy="32" r="30" fill="url(#gloss)"/>
  <circle cx="32" cy="32" r="30" fill="url(#gloss2)"/>
</svg>
